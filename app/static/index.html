<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0e0f;
    --surface:   #161618;
    --border:    #2a2a2d;
    --text:      #e8e6e0;
    --muted:     #6b6b72;
    --accent:    #c9a96e;
    --accent-dim:#7a5f35;
    --user-bg:   #1e1e21;
    --agent-bg:  #131315;
    --radius:    12px;
    --green:     #6dbf8a;
    --green-dim: #2d5c3d;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 0.01em;
    margin-right: 8px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
  }
  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    background: none;
  }
  .tab:hover { color: var(--text); border-color: var(--border); }
  .tab.active {
    color: var(--accent);
    border-color: var(--accent-dim);
    background: rgba(201,169,110,0.06);
  }

  header .sprint {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── Panels ── */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* ══════════════════════════════
     CHAT PANEL
  ══════════════════════════════ */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 760px;
    animation: fadeUp 0.25s ease both;
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .label {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.7;
    font-size: 0.92rem;
  }
  .msg.user .bubble { background: var(--user-bg); border: 1px solid var(--border); }
  .msg.agent .bubble { background: var(--agent-bg); border: 1px solid var(--border); }

  .sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .source-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    background: rgba(201,169,110,0.08);
    border: 1px solid var(--accent-dim);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }

  .thinking .bubble { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1); }
  }

  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    pointer-events: none;
    user-select: none;
  }
  #empty .big { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--border); }
  #empty p { font-size: 0.85rem; }

  #chat-footer {
    padding: 20px 32px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #form { display: flex; gap: 10px; max-width: 760px; margin: 0 auto; }
  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 48px;
    line-height: 1.5;
  }
  #input:focus { border-color: var(--accent-dim); }
  #input::placeholder { color: var(--muted); }
  #send {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0e0e0f;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.88rem;
    padding: 0 20px;
    cursor: pointer;
    transition: opacity 0.15s;
    height: 48px;
  }
  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.3; cursor: default; }

  /* ══════════════════════════════
     VORLESUNG PANEL
  ══════════════════════════════ */
  #vl-panel {
    overflow-y: auto;
    padding: 32px;
    gap: 28px;
  }
  #vl-panel::-webkit-scrollbar { width: 4px; }
  #vl-panel::-webkit-scrollbar-track { background: transparent; }
  #vl-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Upload zone */
  #drop-zone {
    max-width: 600px;
    margin: 0 auto;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--accent-dim);
    background: rgba(201,169,110,0.04);
  }
  #drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  #drop-zone .icon {
    font-size: 2rem;
    margin-bottom: 12px;
    color: var(--muted);
  }
  #drop-zone p {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
  }
  #drop-zone .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent-dim);
    margin-top: 8px;
  }

  #process-btn {
    display: block;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0e0e0f;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.92rem;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #process-btn:hover { opacity: 0.85; }
  #process-btn:disabled { opacity: 0.3; cursor: default; }

  /* Progress */
  #vl-progress {
    max-width: 600px;
    margin: 0 auto;
    display: none;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }
  #vl-progress.show { display: flex; }
  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
    animation: indeterminate 1.4s ease infinite;
  }
  @keyframes indeterminate {
    0%   { transform: translateX(-100%) scaleX(0.5); }
    50%  { transform: translateX(25%) scaleX(0.8); }
    100% { transform: translateX(100%) scaleX(0.5); }
  }
  #vl-progress p {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* Results */
  #vl-results { display: none; flex-direction: column; gap: 28px; max-width: 760px; margin: 0 auto; width: 100%; }
  #vl-results.show { display: flex; }

  .result-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  .result-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-header .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .badge-summary { background: rgba(201,169,110,0.12); color: var(--accent); border: 1px solid var(--accent-dim); }
  .badge-cards   { background: rgba(109,191,138,0.1);  color: var(--green);  border: 1px solid var(--green-dim); }
  .badge-quiz    { background: rgba(120,120,200,0.1);  color: #9b9bdf;       border: 1px solid #4a4a8a; }
  .result-header .count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Summary */
  .summary-body {
    padding: 20px;
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--text);
  }

  /* Karteikarten */
  .cards-grid {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .karte {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    min-height: 90px;
    position: relative;
  }
  .karte:hover { border-color: var(--green-dim); }
  .karte .frage {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.5;
    font-weight: 400;
  }
  .karte .antwort {
    font-size: 0.85rem;
    color: var(--green);
    line-height: 1.5;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .karte.flipped .antwort { display: block; }
  .karte .flip-hint {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .karte:hover .flip-hint { opacity: 1; }

  /* Quiz */
  .quiz-list { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
  .quiz-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .quiz-q {
    font-size: 0.9rem;
    font-weight: 400;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .quiz-q .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-right: 8px;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 6px; }
  .quiz-opt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .quiz-opt .opt-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    flex-shrink: 0;
  }
  .quiz-opt:hover:not(:disabled) { border-color: #9b9bdf; background: rgba(120,120,200,0.05); }
  .quiz-opt.correct  { border-color: var(--green); background: rgba(109,191,138,0.08); color: var(--green); }
  .quiz-opt.wrong    { border-color: #bf6d6d; background: rgba(191,109,109,0.08); color: #bf6d6d; }
  .quiz-opt:disabled { cursor: default; }
  .quiz-explanation {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    display: none;
  }
  .quiz-item.answered .quiz-explanation { display: block; }

  /* Reset btn */
  #reset-btn {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  #reset-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Study Agent</h1>
  <div class="tabs">
    <button class="tab active" data-tab="chat">Chat</button>
    <button class="tab" data-tab="vl">Vorlesung</button>
  </div>
  <span class="sprint">RAG · Sprint 2</span>
</header>

<!-- ── CHAT PANEL ── -->
<div class="panel active" id="panel-chat">
  <div id="chat">
    <div id="empty">
      <div class="big">∎</div>
      <p>Stelle eine Frage zu deinen Lernmaterialien.</p>
    </div>
  </div>
  <footer id="chat-footer">
    <div id="form">
      <textarea id="input" placeholder="Frage stellen…" rows="1"></textarea>
      <button id="send">Senden</button>
    </div>
  </footer>
</div>

<!-- ── VORLESUNG PANEL ── -->
<div class="panel" id="panel-vl">
  <div id="vl-panel">

    <!-- Upload -->
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".pdf,.txt,.md,.docx">
      <div class="icon">⬆</div>
      <p>Vorlesung hier ablegen oder klicken zum Auswählen</p>
      <div class="hint">PDF · TXT · MD · DOCX</div>
    </div>

    <button id="process-btn" disabled>Analysieren</button>

    <!-- Progress -->
    <div id="vl-progress">
      <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
      <p>GPT-4o-mini analysiert…</p>
    </div>

    <!-- Results -->
    <div id="vl-results">

      <!-- Zusammenfassung -->
      <div class="result-section" id="sec-summary">
        <div class="result-header">
          <span class="badge badge-summary">Zusammenfassung</span>
        </div>
        <div class="summary-body" id="summary-text"></div>
      </div>

      <!-- Karteikarten -->
      <div class="result-section" id="sec-cards">
        <div class="result-header">
          <span class="badge badge-cards">Karteikarten</span>
          <span class="count" id="cards-count"></span>
        </div>
        <div class="cards-grid" id="cards-grid"></div>
      </div>

      <!-- Quiz -->
      <div class="result-section" id="sec-quiz">
        <div class="result-header">
          <span class="badge badge-quiz">Quiz</span>
          <span class="count" id="quiz-count"></span>
        </div>
        <div class="quiz-list" id="quiz-list"></div>
      </div>

    </div>

    <button id="reset-btn" style="display:none">Neue Vorlesung laden</button>

  </div>
</div>

<script>
// ── Tab switching ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ══════════════════════════════
// CHAT
// ══════════════════════════════
const chat    = document.getElementById('chat');
const empty   = document.getElementById('empty');
const input   = document.getElementById('input');
const sendBtn = document.getElementById('send');

function addMsg(role, content, sources) {
  if (empty.parentNode) empty.remove();
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'Du' : 'Agent';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  if (sources && sources.length) {
    const srcRow = document.createElement('div');
    srcRow.className = 'sources';
    sources.forEach(s => {
      const tag = document.createElement('div');
      tag.className = 'source-tag';
      const name = s.source.split(/[\\/]/).pop() || s.source;
      tag.textContent = `${name}  ${s.score}`;
      tag.title = s.source;
      srcRow.appendChild(tag);
    });
    wrap.appendChild(srcRow);
  }
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addThinking() {
  if (empty.parentNode) empty.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg agent thinking';
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = 'Agent';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

async function send() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  sendBtn.disabled = true;
  addMsg('user', q);
  const thinking = addThinking();
  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    thinking.remove();
    addMsg('agent', data.answer, data.sources);
  } catch (e) {
    thinking.remove();
    addMsg('agent', 'Fehler beim Verbinden mit dem Server.');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ══════════════════════════════
// VORLESUNG PIPELINE
// ══════════════════════════════
const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const processBtn  = document.getElementById('process-btn');
const vlProgress  = document.getElementById('vl-progress');
const vlResults   = document.getElementById('vl-results');
const resetBtn    = document.getElementById('reset-btn');

let selectedFile = null;

fileInput.addEventListener('change', () => {
  selectedFile = fileInput.files[0];
  if (selectedFile) {
    dropZone.querySelector('p').textContent = selectedFile.name;
    dropZone.style.borderColor = 'var(--accent-dim)';
    processBtn.disabled = false;
  }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) {
    selectedFile = f;
    dropZone.querySelector('p').textContent = f.name;
    dropZone.style.borderColor = 'var(--accent-dim)';
    processBtn.disabled = false;
  }
});

processBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  processBtn.disabled = true;
  dropZone.style.display = 'none';
  vlProgress.classList.add('show');
  vlResults.classList.remove('show');
  resetBtn.style.display = 'none';

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res = await fetch('/process', { method: 'POST', body: formData });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    alert('Fehler: ' + e.message);
    resetView();
  } finally {
    vlProgress.classList.remove('show');
  }
});

resetBtn.addEventListener('click', resetView);

function resetView() {
  selectedFile = null;
  fileInput.value = '';
  dropZone.querySelector('p').textContent = 'Vorlesung hier ablegen oder klicken zum Auswählen';
  dropZone.style.borderColor = '';
  dropZone.style.display = '';
  vlResults.classList.remove('show');
  resetBtn.style.display = 'none';
  processBtn.disabled = true;
}

function renderResults(data) {
  // Zusammenfassung
  document.getElementById('summary-text').textContent = data.zusammenfassung || '—';

  // Karteikarten
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const cards = data.karteikarten || [];
  document.getElementById('cards-count').textContent = cards.length + ' Karten';
  cards.forEach(k => {
    const el = document.createElement('div');
    el.className = 'karte';
    el.innerHTML = `
      <div class="frage">${escHtml(k.frage)}</div>
      <div class="antwort">${escHtml(k.antwort)}</div>
      <div class="flip-hint">klicken zum umdrehen</div>`;
    el.addEventListener('click', () => el.classList.toggle('flipped'));
    grid.appendChild(el);
  });

  // Quiz
  const list = document.getElementById('quiz-list');
  list.innerHTML = '';
  const questions = data.quiz || [];
  document.getElementById('quiz-count').textContent = questions.length + ' Fragen';
  questions.forEach((q, qi) => {
    const item = document.createElement('div');
    item.className = 'quiz-item';
    const labels = ['A', 'B', 'C', 'D'];
    const optsHtml = (q.optionen || []).map((o, i) => `
      <button class="quiz-opt" data-idx="${i}">
        <span class="opt-label">${labels[i] || i}</span>
        ${escHtml(o)}
      </button>`).join('');
    item.innerHTML = `
      <div class="quiz-q"><span class="q-num">${qi + 1}.</span>${escHtml(q.frage)}</div>
      <div class="quiz-options">${optsHtml}</div>
      <div class="quiz-explanation">Richtige Antwort: ${escHtml((q.optionen || [])[q.richtig] || '')}</div>`;
    item.querySelectorAll('.quiz-opt').forEach(btn => {
      btn.addEventListener('click', () => {
        if (item.classList.contains('answered')) return;
        item.classList.add('answered');
        const chosen = parseInt(btn.dataset.idx);
        item.querySelectorAll('.quiz-opt').forEach((b, i) => {
          b.disabled = true;
          if (i === q.richtig) b.classList.add('correct');
          else if (i === chosen) b.classList.add('wrong');
        });
      });
    });
    list.appendChild(item);
  });

  vlResults.classList.add('show');
  resetBtn.style.display = 'block';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
